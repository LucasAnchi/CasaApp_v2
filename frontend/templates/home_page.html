<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <title>CasaApp</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="/static/style.css" />
    </head>
    <body>
        <div class="bg-overlay"></div>

        <header id="header">
            <div id="pull-left">
                <h1>CasaApp</h1>
                <p>Gerencie sua casa</p>
            </div>

            <nav id="redirect">
                <a href="/login">Login</a>
                <a href="/cadastro">Cadastro</a>
                <a href="/sobre">Sobre</a>
            </nav>
        </header>

        <main class="box">
            <h2>Controle sua casa em um só lugar</h2>
            <p>Organize alimentos, produtos de limpeza e tudo que você tem em casa de forma simples e rápida.</p>

            <div class="buttons">
                <a href="/cadastro" class="primary">Criar conta</a>
                <a href="/login" class="secondary">Entrar</a>
            </div>
        </main>
    </body>
</html>
