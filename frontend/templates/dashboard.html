<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <title>CasaApp - Dashboard</title>
        <link rel="stylesheet" href="/static/dashboard.css" />
    </head>
    <body>
        <div class="app">
            <aside class="sidebar">
                <h2>CasaApp</h2>
                <a href="#">Dashboard</a>
                <a href="#">Produtos</a>
                <a href="#">Categorias</a>
                <a href="#">Alertas</a>
                <a href="#" onclick="logout()">Sair</a>
            </aside>

            <main class="content">
                <h1>Visão Geral</h1>

                <div class="cards">
                    <div class="card">
                        <p>Total de Produtos</p>
                        <h2 id="total-produtos">0</h2>
                    </div>
                    <div class="card">
                        <p>Estoque Baixo</p>
                        <h2 id="estoque-baixo">0</h2>
                    </div>
                    <div class="card">
                        <p>Categorias</p>
                        <h2 id="categorias">0</h2>
                    </div>
                </div>

                <h2>Produtos</h2>

                <table>
                    <tr>
                        <th>Nome</th>
                        <th>Quantidade</th>
                        <th>Preço</th>
                        <th>Ação</th>
                    </tr>
                    <tbody id="produtos-tabela"></tbody>
                </table>

                <button class="add" onclick="openModal()">+ Adicionar Produto</button>
            </main>
            <div id="modal-add" class="modal hidden">
                <div class="modal-content">
                    <h2>Adicionar Produto</h2>

                    <input id="item-name" placeholder="Nome do produto" />
                    <input id="item-qntd" type="number" placeholder="Quantidade" />
                    <input id="item-price" type="number" step="0.01" placeholder="Preço" />

                    <div class="modal-actions">
                        <button onclick="addItem()">Salvar</button>
                        <button onclick="closeModal()">Cancelar</button>
                    </div>
                </div>
            </div>
    </body>
</html>
